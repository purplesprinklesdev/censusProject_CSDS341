<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Census Bellwether Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      background: #f0f2f5;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 8px;
    }

    .sidebar-title {
      color: #aab;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .sidebar button {
      background: transparent;
      color: #c8cdd8;
      border: none;
      padding: 9px 12px;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.875rem;
      transition: background 0.15s;
    }

    .sidebar button:hover { background: #252545; color: #fff; }
    .sidebar button.active { background: #3b5bdb; color: #fff; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 32px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .main-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .main-header h1 { font-size: 1.4rem; color: #1a1a2e; }
    .query-label { font-size: 0.9rem; color: #888; }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-empty {
      padding: 40px;
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
    }

    /* ── Param panel ── */
    .param-panel {
      padding: 24px 28px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .param-panel label {
      font-size: 0.9rem;
      color: #444;
      white-space: nowrap;
    }

    .param-panel input[type=number] {
      width: 90px;
      padding: 7px 10px;
      border: 1px solid #dde;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    .param-panel input[type=number]:focus { border-color: #3b5bdb; }

    .run-btn {
      background: #3b5bdb;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .run-btn:hover { background: #2f4ac0; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #f7f8fa;
      color: #555;
      font-weight: 600;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 2px solid #e8eaf0;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }

    /* ── Status ── */
    .loading {
      padding: 32px;
      text-align: center;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ddd;
      border-top-color: #3b5bdb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      padding: 24px 32px;
      color: #c0392b;
      font-size: 0.9rem;
    }

    .row-count {
      padding: 10px 16px;
      color: #999;
      font-size: 0.8rem;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">Queries</div>
  {% for name, label, has_param in queries %}
  <button
    data-name="{{ name }}"
    data-label="{{ label }}"
    data-has-param="{{ 'true' if has_param else 'false' }}"
    onclick="selectQuery(this)">
    {{ label }}
  </button>
  {% endfor %}
</aside>

<main class="main">
  <div class="main-header">
    <h1>Census Bellwether Finder</h1>
    <span class="query-label" id="query-label">Select a query to run</span>
  </div>

  <div class="card" id="results-card">
    <div class="card-empty">Select a query from the sidebar to see results.</div>
  </div>
</main>

<script>
  let activeBtn = null;

  function selectQuery(btn) {
    const name = btn.dataset.name;
    const label = btn.dataset.label;
    const hasParam = btn.dataset.hasParam === 'true';

    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    document.getElementById('query-label').textContent = label;

    if (hasParam) {
      showParamInput(name);
    } else {
      fetchQuery(name, null);
    }
  }

  function showParamInput(name) {
    document.getElementById('results-card').innerHTML = `
      <div class="param-panel">
        <label>Age threshold (0–100):</label>
        <input type="number" id="param-val" min="0" max="100" value="20">
        <button class="run-btn" onclick="fetchQuery('${name}', +document.getElementById('param-val').value)">
          Run
        </button>
      </div>
      <div id="param-results"></div>
    `;
    document.getElementById('param-val').addEventListener('keydown', e => {
      if (e.key === 'Enter')
        fetchQuery(name, +document.getElementById('param-val').value);
    });
  }

  function fetchQuery(name, value) {
    const target = (value !== null && document.getElementById('param-results'))
      ? document.getElementById('param-results')
      : document.getElementById('results-card');
    target.innerHTML = '<div class="loading"><span class="spinner"></span>Running...</div>';

    const url = value !== null ? `/run/${name}?value=${encodeURIComponent(value)}` : `/run/${name}`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          target.innerHTML = `<div class="error-msg">Error: ${data.error}</div>`;
          return;
        }
        if (data.rows.length === 0) {
          target.innerHTML = '<div class="card-empty">Query returned no rows.</div>';
          return;
        }

        let html = '<div class="table-wrap"><table><thead><tr>';
        data.columns.forEach(col => { html += `<th>${col}</th>`; });
        html += '</tr></thead><tbody>';
        data.rows.forEach(row => {
          html += '<tr>';
          row.forEach(cell => {
            const val = cell === null
              ? '<span style="color:#bbb">NULL</span>'
              : typeof cell === 'number' ? cell.toLocaleString() : cell;
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });
        html += `</tbody></table></div>
                 <div class="row-count">${data.rows.length} row${data.rows.length !== 1 ? 's' : ''}</div>`;
        target.innerHTML = html;
      })
      .catch(() => {
        target.innerHTML = '<div class="error-msg">Failed to reach the server.</div>';
      });
  }
</script>

</body>
</html>
