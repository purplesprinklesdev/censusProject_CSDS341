<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Census Bellwether Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      background: #f0f2f5;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 8px;
      overflow-y: auto;
    }

    .sidebar-title {
      color: #aab;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .sidebar button {
      background: transparent;
      color: #c8cdd8;
      border: none;
      padding: 9px 12px;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.875rem;
      transition: background 0.15s;
    }

    .sidebar button:hover { background: #252545; color: #fff; }
    .sidebar button.active { background: #3b5bdb; color: #fff; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 32px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .main-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .main-header h1 { font-size: 1.4rem; color: #1a1a2e; }
    .query-label { font-size: 0.9rem; color: #888; }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-empty {
      padding: 40px;
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
    }

    /* ── Param panel ── */
    .param-panel {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .param-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .param-field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .param-field input {
      padding: 7px 10px;
      border: 1px solid #dde;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    .param-field input:focus { border-color: #3b5bdb; }

    .run-btn {
      background: #3b5bdb;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
      height: 36px;
    }

    .run-btn:hover { background: #2f4ac0; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #f7f8fa;
      color: #555;
      font-weight: 600;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 2px solid #e8eaf0;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }

    /* ── Status ── */
    .loading {
      padding: 32px;
      text-align: center;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #ddd;
      border-top-color: #3b5bdb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      padding: 24px 32px;
      color: #c0392b;
      font-size: 0.9rem;
    }

    .row-count {
      padding: 10px 16px;
      color: #999;
      font-size: 0.8rem;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">Queries</div>
  {% for name, label, params in queries %}
  <button
    data-name="{{ name }}"
    data-label="{{ label }}"
    data-params='{{ params | tojson }}'
    onclick="selectQuery(this)">
    {{ label }}
  </button>
  {% endfor %}
</aside>

<main class="main">
  <div class="main-header">
    <h1>Census Bellwether Finder</h1>
    <span class="query-label" id="query-label">Select a query to run</span>
  </div>

  <div class="card" id="results-card">
    <div class="card-empty">Select a query from the sidebar to see results.</div>
  </div>
</main>

<script>
  let activeBtn = null;
  let currentFetch = null;

  function selectQuery(btn) {
    const name   = btn.dataset.name;
    const label  = btn.dataset.label;
    const params = JSON.parse(btn.dataset.params);  // null or [{label, type, ...}]

    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    document.getElementById('query-label').textContent = label;

    if (params) {
      showParamInput(name, params);
    } else {
      fetchQuery(name, []);
    }
  }

  function showParamInput(name, params) {
    const fieldsHtml = params.map((p, i) => {
      const extra = p.type === 'text'
        ? 'maxlength="2" style="width:60px;text-transform:uppercase"'
        : `style="width:90px" ${p.min !== undefined ? `min="${p.min}"` : ''} ${p.max !== undefined ? `max="${p.max}"` : ''}`;
      return `
        <div class="param-field">
          <label>${p.label}</label>
          <input id="pv${i}" type="${p.type}" ${extra}>
        </div>`;
    }).join('');

    document.getElementById('results-card').innerHTML = `
      <div class="param-panel">
        ${fieldsHtml}
        <button class="run-btn" onclick="runWithParams('${name}', ${params.length})">Run</button>
      </div>
      <div id="param-results"></div>
    `;

    document.querySelectorAll('[id^="pv"]').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') runWithParams(name, params.length);
      });
    });
    document.getElementById('pv0')?.focus();
  }

  function runWithParams(name, count) {
    const values = Array.from({length: count}, (_, i) => document.getElementById(`pv${i}`).value);
    fetchQuery(name, values);
  }

  function fetchQuery(name, values) {
    // Cancel any previous in-flight request so its result doesn't overwrite ours
    if (currentFetch) {
      currentFetch.abort();
      currentFetch = null;
    }

    const target = (values.length > 0 && document.getElementById('param-results'))
      ? document.getElementById('param-results')
      : document.getElementById('results-card');

    target.innerHTML = '<div class="loading"><span class="spinner"></span>Running...</div>';

    const qs  = values.map(v => `value=${encodeURIComponent(v)}`).join('&');
    const url = `/run/${name}${qs ? '?' + qs : ''}`;

    const controller = new AbortController();
    currentFetch = controller;

    fetch(url, { signal: controller.signal })
      .then(r => r.json())
      .then(data => {
        currentFetch = null;

        if (data.error) {
          target.innerHTML = `<div class="error-msg">Error: ${data.error}</div>`;
          return;
        }
        if (data.rows.length === 0) {
          target.innerHTML = '<div class="card-empty">Query returned no rows.</div>';
          return;
        }

        let html = '<div class="table-wrap"><table><thead><tr>';
        data.columns.forEach(col => { html += `<th>${col}</th>`; });
        html += '</tr></thead><tbody>';
        data.rows.forEach(row => {
          html += '<tr>';
          row.forEach(cell => {
            const val = cell === null
              ? '<span style="color:#bbb">NULL</span>'
              : typeof cell === 'number' ? cell.toLocaleString() : cell;
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });
        html += `</tbody></table></div>
                 <div class="row-count">${data.rows.length} row${data.rows.length !== 1 ? 's' : ''}</div>`;
        target.innerHTML = html;
      })
      .catch(err => {
        if (err.name === 'AbortError') return;
        currentFetch = null;
        target.innerHTML = '<div class="error-msg">Failed to reach the server.</div>';
      });
  }
</script>

</body>
</html>
